{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini Restaurant{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/mini.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <a class="brand" href="{% url 'home' %}" aria-label="Mini Restaurant home">
            <img src="{% static 'images/logo.jpg' %}" alt="">
            <span>Mini Restaurant</span>
        </a>
        <nav class="nav-menu" aria-label="Primary navigation">
            <ul class="nav-links">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'restaurants' %}">Restaurants</a></li>
                <li><a href="{% url 'chefs' %}">Chefs</a></li>
                <li><a href="{% url 'book_table' %}">Book Table</a></li>
                <li><a href="{% url 'terms' %}">Terms</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
            </ul>
        </nav>
        <a class="nav-reserve" href="{% url 'book_table' %}">Reserve</a>
    </header>

    {% block content %}{% endblock %}

    <footer class="footer">
        <p>&copy; 2026 Mini Restaurant &bull; Bengaluru &bull; All Rights Reserved</p>
    </footer>
</body>
</html>
