services:
  - type: web
    name: mini-restaurant
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn res.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: mini-restaurant.onrender.com,mini-res-app.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mini-restaurant.onrender.com,https://mini-res-app.onrender.com
